<!-- favicon.svg — simple scalable brand favicon (replace with your own later) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TravelNest">
  <!-- Rounded square background in the Indigo Sky primary colour -->
  <rect width="64" height="64" rx="14" fill="#34508F"/>
  <!-- "TN" monogram centred in white -->
  <text x="32" y="42" text-anchor="middle" font-family="Georgia, serif"
        font-size="30" font-weight="700" fill="#FFFFFF">TN</text>
  <!-- Small accent dot for a touch of the Indigo Sky accent colour -->
  <circle cx="50" cy="16" r="5" fill="#F2992E"/>
</svg>
